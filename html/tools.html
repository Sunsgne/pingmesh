<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>检测工具 - ZENLENET PingMesh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<link href="assets/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/css/modern.css" rel="stylesheet">
</head>
<body>
<div id="app">

  <div class="card">
    <div class="card-head">
      <h3>多节点网络检测</h3>
      <span class="sub">从所有探测节点同时发起检测，对比各地连通性与质量</span>
    </div>
    <div class="card-body">
      <div class="flex mb-2">
        <select class="input" style="width:150px" id="probe-type">
          <option value="icmp">ICMP PING</option>
          <option value="tcp">TCP Ping</option>
          <option value="http">HTTP (curl)</option>
          <option value="mtr">MTR 路由追踪</option>
          <option value="dns">DNS 解析</option>
        </select>
        <input type="text" class="input" id="target" placeholder="" style="max-width:430px">
        <button class="btn primary" id="check-btn">开始检测</button>
        <span class="spacer"></span>
      </div>
      <div class="hint mb-4" id="type-hint"></div>

      <table class="sp-table" id="result-table">
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="list"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- MTR 结果 -->
<div class="sp-modal-mask" id="mtr-modal">
  <div class="sp-modal lg">
    <div class="m-head"><h3 id="mtr-title">MTR 路由追踪</h3><button class="m-close">&times;</button></div>
    <div class="m-body" style="padding:0">
      <table class="sp-table">
        <thead><tr><th>#</th><th>Host</th><th>Loss%</th><th>Snt</th><th>Last</th><th>Avg</th><th>Best</th><th>Wrst</th><th>StDev</th></tr></thead>
        <tbody id="tracertdata"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="assets/js/jquery-1.7.2.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
$(function () {
SP.init('tools', '检测工具').done(function (ctx) {
    var cfg = ctx.config;
    var mtrResults = {};

    var typeMeta = {
        icmp: {
            hint: 'ICMP PING：5 个探测包，统计延迟与丢包。目标填 IP 或域名',
            ph: '如 8.8.8.8 或 www.example.com',
            cols: ['解析 IP', '发送', '接收', '丢包', '最大延迟', '最小延迟', '平均延迟', '状态']
        },
        tcp: {
            hint: 'TCP Ping：5 次 TCP 连接建立耗时，可探测被禁 PING 的主机与具体端口。目标填 host:端口（缺省 80）',
            ph: '如 www.example.com:443 或 10.0.0.1:22',
            cols: ['解析 IP', '端口', '发送', '成功', '失败率', '最大耗时', '最小耗时', '平均耗时', '状态']
        },
        http: {
            hint: 'HTTP(curl)：GET 请求并分段计时（DNS / 连接 / TLS / 首字节 / 总耗时），支持 http/https',
            ph: '如 https://www.example.com/api/health',
            cols: ['解析 IP', '状态码', 'DNS', '连接', 'TLS', '首字节', '总耗时', '大小', '状态']
        },
        mtr: {
            hint: 'MTR：逐跳路由追踪（每跳 5 个探测包），定位丢包/高延迟发生在哪一跳。耗时约 10~30 秒',
            ph: '如 8.8.8.8 或 www.example.com',
            cols: ['解析 IP', '跳数', '末跳延迟', '路径详情', '状态']
        },
        dns: {
            hint: 'DNS 解析：各节点本地 DNS 解析结果与耗时，排查解析劫持 / 污染 / 区域差异',
            ph: '如 www.example.com',
            cols: ['解析结果', '耗时', '状态']
        }
    };

    function applyType() {
        var t = $('#probe-type').val();
        var m = typeMeta[t];
        $('#type-hint').text(m.hint);
        $('#target').attr('placeholder', m.ph);
        var h = '<th style="width:36px"><input type="checkbox" id="allchecked" checked></th><th>检测节点</th>';
        $.each(m.cols, function (_, c) { h += '<th>' + c + '</th>'; });
        $('#thead-row').html(h);
        renderRows(m.cols.length);
        $('#allchecked').change(function () {
            $('#list input[type=checkbox]').prop('checked', $(this).is(':checked'));
        });
    }

    function renderRows(colCnt) {
        var box = $('#list').empty();
        $.each(cfg.Network, function (_, n) {
            if (!n.Pingmesh) return;
            var tds = '';
            for (var i = 0; i < colCnt - 1; i++) tds += '<td class="rc rc-' + i + '">-</td>';
            box.append('<tr data-v="' + SP.esc(n.Addr) + ':' + cfg.Port + '">' +
                '<td><input type="checkbox" checked></td>' +
                '<td><b>' + SP.esc(n.Name) + '</b><br><span class="muted mono" style="font-size:11px">' + SP.esc(n.Addr) + '</span></td>' +
                tds + '<td class="rc-status"><span class="badge gray">待检测</span></td></tr>');
        });
    }

    $('#probe-type').change(applyType);
    applyType();
    $('#target').val(cfg.Addr);
    $('#target').keypress(function (e) { if (e.which === 13) run(); });
    $('#check-btn').click(run);

    function fmtMs(v) { return (v == null || isNaN(v)) ? '-' : Number(v).toFixed(1) + ' ms'; }
    function lossBadge(v) {
        var cls = v >= 20 ? 'red' : (v >= 5 ? 'yellow' : 'green');
        return '<span class="badge ' + cls + '">' + v + '%</span>';
    }

    function run() {
        var target = $.trim($('#target').val());
        var ttype = $('#probe-type').val();
        if (!target) { SP.toast('请输入检测目标', 'err'); return; }
        var timeout = ttype === 'mtr' ? 90000 : 35000;
        $('#list tr').each(function () {
            var tr = $(this);
            if (!tr.find('input[type=checkbox]').is(':checked')) {
                tr.find('.rc-status').html('<span class="badge gray">已跳过</span>');
                return;
            }
            tr.find('.rc').text('-');
            tr.find('.rc-status').html('<span class="spinner"></span>');
            var addr = tr.attr('data-v');
            var proxyT = ttype === 'mtr' ? 80 : 30;
            $.ajax({
                dataType: 'json',
                url: '/api/proxy.json?t=' + proxyT + '&g=http://' + addr + '/api/tools.json?t=' + encodeURIComponent(target) + '%26type=' + ttype,
                timeout: timeout
            }).done(function (res) {
                renderResult(tr, ttype, res);
            }).fail(function (xhr) {
                tr.find('.rc-status').html('<span class="badge red" title="' + SP.esc(xhr.responseText || xhr.statusText || '') + '">节点异常</span>');
            });
        });
    }

    function renderResult(tr, ttype, res) {
        function ok() { tr.find('.rc-status').html('<span class="badge green"><span class="dot"></span>完成</span>'); }
        function bad(msg) { tr.find('.rc-status').html('<span class="badge yellow" title="' + SP.esc(msg || '') + '">' + SP.esc((msg || '失败').substring(0, 18)) + '</span>'); }
        if (res.status !== 'true') { bad(res.error); return; }
        var c = tr.find('.rc');
        if (ttype === 'icmp') {
            var p = res.ping;
            c.eq(0).text(res.ip || '-');
            c.eq(1).text(p.SendPk); c.eq(2).text(p.RevcPk);
            c.eq(3).html(lossBadge(p.LossPk));
            c.eq(4).text(fmtMs(p.MaxDelay)); c.eq(5).text(fmtMs(p.MinDelay));
            c.eq(6).html('<b>' + fmtMs(p.AvgDelay) + '</b>');
            ok();
        } else if (ttype === 'tcp') {
            var p = res.ping;
            c.eq(0).text(res.ip || '-'); c.eq(1).text(res.port || '-');
            c.eq(2).text(p.SendPk); c.eq(3).text(p.RevcPk);
            c.eq(4).html(lossBadge(p.LossPk));
            c.eq(5).text(fmtMs(p.MaxDelay)); c.eq(6).text(fmtMs(p.MinDelay));
            c.eq(7).html('<b>' + fmtMs(p.AvgDelay) + '</b>');
            res.error ? bad(res.error) : ok();
        } else if (ttype === 'http') {
            var h = res.http;
            c.eq(0).text(res.ip || '-');
            var codeCls = h.code >= 200 && h.code < 400 ? 'green' : 'red';
            c.eq(1).html('<span class="badge ' + codeCls + '">' + h.code + '</span>');
            c.eq(2).text(fmtMs(h.dnsms)); c.eq(3).text(fmtMs(h.connectms));
            c.eq(4).text(h.tlsms > 0 ? fmtMs(h.tlsms) : '-');
            c.eq(5).text(fmtMs(h.ttfbms));
            c.eq(6).html('<b>' + fmtMs(h.totalms) + '</b>');
            c.eq(7).text(h.size >= 1024 ? (h.size / 1024).toFixed(1) + ' KB' : h.size + ' B');
            ok();
        } else if (ttype === 'mtr') {
            var hops = res.mtr || [];
            c.eq(0).text(res.ip || '-');
            c.eq(1).text(hops.length + ' 跳');
            c.eq(2).text(hops.length ? (hops[hops.length - 1].Avg / 1e6).toFixed(1) + ' ms' : '-');
            var key = tr.attr('data-v');
            mtrResults[key] = hops;
            c.eq(3).html('<a class="mtr-view" data-k="' + SP.esc(key) + '">查看 ' + hops.length + ' 跳路径 &rarr;</a>');
            tr.find('.mtr-view').click(function () { showMtr($(this).attr('data-k'), tr.find('b').first().text()); });
            ok();
        } else if (ttype === 'dns') {
            var d = res.dns;
            c.eq(0).html('<span class="mono" style="font-size:12px">' + SP.esc((d.ips || []).join(', ')) + '</span>');
            c.eq(1).text(fmtMs(d.ms));
            ok();
        }
    }

    function showMtr(key, nodeName) {
        var hops = mtrResults[key] || [];
        $('#mtr-title').text('MTR 路由追踪 - 从 ' + nodeName + ' 出发');
        var body = $('#tracertdata').empty();
        $.each(hops, function (n, h) {
            var loss = h.Send > 0 ? (h.Loss / h.Send * 100) : 0;
            body.append('<tr' + (loss >= 50 ? ' style="background:var(--sp-red-soft)"' : '') + '>' +
                '<td>' + (n + 1) + '</td><td class="mono">' + SP.esc(h.Host) + '</td>' +
                '<td>' + loss.toFixed(1) + '%</td><td>' + h.Send + '</td>' +
                '<td>' + (h.Last / 1e6).toFixed(2) + '</td><td>' + (h.Avg / 1e6).toFixed(2) + '</td>' +
                '<td>' + (h.Best / 1e6).toFixed(2) + '</td><td>' + (h.Wrst / 1e6).toFixed(2) + '</td>' +
                '<td>' + h.StDev.toFixed(2) + '</td></tr>');
        });
        SP.openModal('mtr-modal');
    }
});
});
</script>
</body>
</html>
