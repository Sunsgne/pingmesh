<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>检测工具 - SmartPing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<link href="assets/css/modern.css" rel="stylesheet">
</head>
<body>
<div id="app">

  <div class="card">
    <div class="card-head">
      <h3>多节点 PING 检测</h3>
      <span class="sub">从各个 SmartPing 节点向目标地址同时发起 ICMP PING 检测</span>
    </div>
    <div class="card-body">
      <div class="flex mb-4">
        <select class="input" style="width:130px" disabled>
          <option>ICMP PING</option>
        </select>
        <input type="text" class="input" id="target" placeholder="输入域名或IP，如 www.example.com" style="max-width:420px">
        <button class="btn primary" id="check-btn">开始检测</button>
        <span class="spacer"></span>
      </div>

      <table class="sp-table" id="result-table">
        <thead>
          <tr>
            <th style="width:36px"><input type="checkbox" id="allchecked" checked></th>
            <th>检测节点</th>
            <th>解析 IP</th>
            <th>发送</th>
            <th>接收</th>
            <th>丢包</th>
            <th>最大延迟</th>
            <th>最小延迟</th>
            <th>平均延迟</th>
            <th style="width:90px">状态</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="assets/js/jquery-1.7.2.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
$(function () {
SP.init('tools', '检测工具').done(function (ctx) {
    var cfg = ctx.config;

    $.each(cfg.Network, function (_, n) {
        if (!n.Smartping) return;
        $('#list').append(
            '<tr data-v="' + SP.esc(n.Addr) + ':' + cfg.Port + '">' +
            '<td><input type="checkbox" checked></td>' +
            '<td><b>' + SP.esc(n.Name) + '</b><br><span class="muted mono" style="font-size:11px">' + SP.esc(n.Addr) + '</span></td>' +
            '<td class="r-ip mono">-</td><td class="r-send">-</td><td class="r-recv">-</td>' +
            '<td class="r-loss">-</td><td class="r-max">-</td><td class="r-min">-</td><td class="r-avg">-</td>' +
            '<td class="r-status"><span class="badge gray">待检测</span></td></tr>');
    });

    $('#target').val(cfg.Addr);
    $('#allchecked').change(function () {
        $('#list input[type=checkbox]').prop('checked', $(this).is(':checked'));
    });
    $('#target').keypress(function (e) { if (e.which === 13) run(); });
    $('#check-btn').click(run);

    function run() {
        var target = $.trim($('#target').val());
        if (!target) { SP.toast('请输入检测目标', 'err'); return; }
        $('#list tr').each(function () {
            var tr = $(this);
            if (!tr.find('input[type=checkbox]').is(':checked')) {
                tr.find('.r-status').html('<span class="badge gray">已跳过</span>');
                return;
            }
            tr.find('.r-ip,.r-send,.r-recv,.r-loss,.r-max,.r-min,.r-avg').text('-');
            tr.find('.r-status').html('<span class="spinner"></span>');
            var addr = tr.attr('data-v');
            $.ajax({
                dataType: 'json',
                url: '/api/proxy.json?t=10&g=http://' + addr + '/api/tools.json?t=' + encodeURIComponent(target),
                timeout: 60000
            }).done(function (result) {
                if (result.status === 'true') {
                    tr.find('.r-ip').text(result.ip);
                    tr.find('.r-send').text(result.ping.SendPk);
                    tr.find('.r-recv').text(result.ping.RevcPk);
                    var loss = result.ping.LossPk;
                    var lossCls = loss >= 20 ? 'red' : (loss >= 5 ? 'yellow' : 'green');
                    tr.find('.r-loss').html('<span class="badge ' + lossCls + '">' + loss + '%</span>');
                    tr.find('.r-max').text(result.ping.MaxDelay.toFixed(2) + ' ms');
                    tr.find('.r-min').text(result.ping.MinDelay.toFixed(2) + ' ms');
                    tr.find('.r-avg').html('<b>' + result.ping.AvgDelay.toFixed(2) + ' ms</b>');
                    tr.find('.r-status').html('<span class="badge green"><span class="dot"></span>完成</span>');
                } else {
                    tr.find('.r-status').html('<span class="badge yellow" title="' + SP.esc(result.error) + '">' + SP.esc(result.error || '失败') + '</span>');
                }
            }).fail(function (xhr) {
                tr.find('.r-status').html('<span class="badge red" title="' + SP.esc(xhr.responseText || '') + '">节点异常</span>');
            });
        });
    }
});
});
</script>
</body>
</html>
