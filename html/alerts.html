<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>报警记录 - SmartPing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<link href="assets/css/modern.css" rel="stylesheet">
</head>
<body>
<div id="app">

  <div class="grid" style="grid-template-columns: 230px 1fr;">
    <div class="card" style="align-self:start">
      <div class="card-head"><h3>报警日期</h3></div>
      <div class="card-body" style="padding:8px 0">
        <table class="sp-table"><tbody id="datelist">
          <tr><td class="muted">加载中...</td></tr>
        </tbody></table>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h3>报警历史 <span class="badge red" id="alert-count" style="display:none"></span></h3>
        <span class="spacer"></span>
        <input type="text" class="input" id="search" placeholder="筛选节点 / IP..." style="width:220px">
        <span class="muted" id="loading"></span>
      </div>
      <div class="card-body" style="padding:0">
        <table class="sp-table">
          <thead>
            <tr>
              <th>报警时间</th><th>源节点</th><th>源 IP</th><th>目标节点</th><th>目标 IP</th><th style="width:80px">MTR</th>
            </tr>
          </thead>
          <tbody id="alertlist"></tbody>
        </table>
        <div class="empty-state" id="empty" style="display:none">
          <div class="big">&#127881;</div>当日没有报警记录
        </div>
      </div>
    </div>
  </div>

</div>

<!-- MTR 详情 -->
<div class="sp-modal-mask" id="mtr-modal">
  <div class="sp-modal lg">
    <div class="m-head"><h3>MTR 路由追踪快照</h3><button class="m-close">&times;</button></div>
    <div class="m-body" style="padding:0">
      <table class="sp-table">
        <thead><tr><th>#</th><th>Host</th><th>Loss%</th><th>Snt</th><th>Last</th><th>Avg</th><th>Best</th><th>Wrst</th><th>StDev</th></tr></thead>
        <tbody id="tracertdata"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="assets/js/jquery-1.7.2.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
$(function () {
SP.init('alerts', '报警记录').done(function (ctx) {
    var cfg = ctx.config;
    var mtrStore = [];
    var allRows = [];

    getdata('');

    function sourceAgents() {
        var list = [];
        $.each(cfg.Network, function (_, n) {
            if ((n.Topology || []).length > 0) list.push(n);
        });
        return list;
    }

    function getdata(d) {
        var agents = sourceAgents();
        var pending = agents.length;
        allRows = [];
        mtrStore = [];
        $('#alertlist').empty();
        $('#loading').html('<span class="spinner"></span>');
        if (pending === 0) { finish(); return; }
        var dates = {};
        $.each(agents, function (_, n) {
            var rurl = '/api/proxy.json?g=http://' + n.Addr + ':' + cfg.Port + '/api/alert.json' + (d ? '?date=' + d : '');
            $.ajax({ dataType: 'json', url: rurl, timeout: (cfg.Base['Timeout'] || 5) * 1000 })
                .done(function (result) {
                    $.each(result[0] || [], function (_, dd) { dates[dd] = true; });
                    $.each(result[1] || [], function (_, row) { allRows.push(row); });
                })
                .always(function () {
                    pending--;
                    if (pending === 0) { renderDates(dates, d); finish(); }
                });
        });
    }

    function renderDates(dates, active) {
        var list = [];
        $.each(dates, function (k) { list.push(k); });
        list.sort().reverse();
        var box = $('#datelist').empty();
        if (list.length === 0) { box.append('<tr><td class="muted">暂无存档</td></tr>'); return; }
        $.each(list, function (_, dd) {
            var cls = (dd === active) ? 'style="color:var(--sp-primary);font-weight:700"' : '';
            box.append('<tr><td><a ' + cls + ' data-d="' + dd + '">' + dd + '</a></td></tr>');
        });
        box.find('a').click(function () { getdata($(this).attr('data-d')); });
    }

    function finish() {
        $('#loading').html('');
        allRows.sort(function (a, b) { return a.Logtime < b.Logtime ? 1 : -1; });
        var box = $('#alertlist').empty();
        $.each(allRows, function (i, r) {
            var mid = mtrStore.length;
            mtrStore.push(r.Tracert);
            box.append('<tr>' +
                '<td>' + SP.esc(r.Logtime) + '</td>' +
                '<td><b>' + SP.esc(r.Fromname) + '</b></td>' +
                '<td class="mono">' + SP.esc(r.Fromip) + '</td>' +
                '<td><b>' + SP.esc(r.Targetname) + '</b></td>' +
                '<td class="mono">' + SP.esc(r.Targetip) + '</td>' +
                '<td><a class="mtr-link" data-i="' + mid + '">查看</a></td></tr>');
        });
        $('#alert-count').text(allRows.length + ' 条').toggle(allRows.length > 0);
        $('#empty').toggle(allRows.length === 0);
        $('.mtr-link').click(function () { showMtr(parseInt($(this).attr('data-i'), 10)); });
        applyFilter();
    }

    function showMtr(i) {
        var body = $('#tracertdata').empty();
        var hops;
        try { hops = JSON.parse(mtrStore[i]); } catch (e) { hops = null; }
        if (!hops || !hops.length) {
            body.append('<tr><td colspan="9" class="muted">无 MTR 数据</td></tr>');
        } else {
            $.each(hops, function (n, h) {
                body.append('<tr><td>' + (n + 1) + '</td><td class="mono">' + SP.esc(h.Host) + '</td>' +
                    '<td>' + ((h.Loss / h.Send) * 100).toFixed(1) + '%</td><td>' + h.Send + '</td>' +
                    '<td>' + (h.Last / 1e6).toFixed(2) + '</td><td>' + (h.Avg / 1e6).toFixed(2) + '</td>' +
                    '<td>' + (h.Best / 1e6).toFixed(2) + '</td><td>' + (h.Wrst / 1e6).toFixed(2) + '</td>' +
                    '<td>' + h.StDev.toFixed(2) + '</td></tr>');
            });
        }
        SP.openModal('mtr-modal');
    }

    function applyFilter() {
        var q = $.trim($('#search').val()).toLowerCase();
        $('#alertlist tr').each(function () {
            var txt = $(this).text().toLowerCase();
            $(this).toggle(q === '' || txt.indexOf(q) >= 0);
        });
    }
    $('#search').keyup(applyFilter);
});
});
</script>
</body>
</html>
