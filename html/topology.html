<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>网络拓扑 - ZENLENET PingMesh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<link href="assets/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/css/modern.css" rel="stylesheet">
</head>
<body>
<div id="app">

  <div class="grid" style="grid-template-columns: 1fr 280px;">
    <div class="card">
      <div class="card-head">
        <h3>互 Ping 拓扑</h3>
        <span class="sub">绿色 = 正常，红色 = 触发报警阈值，可拖拽节点</span>
        <span class="spacer"></span>
        <span class="flex" style="gap:7px;font-size:12.5px;color:var(--sp-text-2)">
          <label class="switch"><input type="checkbox" id="sound-toggle" checked><span class="track"></span></label>
          声音报警
        </span>
      </div>
      <div class="card-body">
        <div id="topo-chart" style="width:100%;height:560px"></div>
      </div>
    </div>

    <div>
      <div class="card mb-4">
        <div class="card-head"><h3>节点状态</h3></div>
        <div class="card-body" style="padding:8px 0">
          <table class="sp-table" id="node-status"><tbody></tbody></table>
        </div>
      </div>
      <a class="btn" style="width:100%" href="alerts.html">查看报警记录 &rarr;</a>
    </div>
  </div>

</div>

<script src="assets/js/jquery-1.7.2.min.js"></script>
<script src="assets/js/echarts.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
$(function () {
SP.init('topology', '网络拓扑').done(function (ctx) {
    var cfg = ctx.config;
    var chart = echarts.init(document.getElementById('topo-chart'));
    var nodes = {}, links = {};
    var pending = 0;
    var hasAlert = false;

    chart.setOption({
        tooltip: { show: true, backgroundColor: 'rgba(15,23,42,.92)', borderWidth: 0, padding: [8, 12], textStyle: { color: '#e2e8f0', fontSize: 12 } },
        animation: false,
        series: [{
            type: 'graph', layout: 'circular', roam: true,
            symbolSize: parseInt(cfg.Topology['Tsymbolsize'] || 60, 10),
            emphasis: { focus: 'adjacency' },
            label: { show: true, fontSize: 12, fontWeight: 600, color: '#fff' },
            edgeSymbol: ['circle', 'arrow'], edgeSymbolSize: [3, 11],
            data: [], links: [],
            lineStyle: { opacity: .9, width: parseFloat(cfg.Topology['Tline'] || 1.5), curveness: 0 }
        }]
    });

    // 构建节点与连线
    $.each(cfg.Network, function (addr, n) {
        var isSource = (n.Topology || []).length > 0;
        nodes[addr] = { name: n.Name, addr: addr, source: isSource, color: isSource ? '#94a3b8' : '#10b981' };
        $.each(n.Topology || [], function (_, topo) {
            links[addr + '-' + topo['Addr']] = {
                from: n.Name, to: SP.nodeName(cfg, topo['Addr']),
                color: '#cbd5e1', curveness: .2
            };
        });
    });

    draw(); // 先以灰色渲染拓扑, 状态返回后增量更新

    var statusBody = $('#node-status tbody');
    $.each(nodes, function (addr, n) {
        if (!n.source) return;
        statusBody.append('<tr><td>' + SP.esc(n.name) + '<br><span class="muted mono" style="font-size:11px">' + SP.esc(addr) + '</span></td>' +
            '<td class="text-right" id="st-' + addr.replace(/\./g, '-') + '"><span class="spinner"></span></td></tr>');
    });

    $.each(nodes, function (addr, n) {
        if (!n.source) return;
        pending++;
        $.ajax({
            dataType: 'json',
            url: '/api/proxy.json?g=http://' + addr + ':' + cfg.Port + '/api/topology.json',
            timeout: (cfg.Base['Timeout'] || 5) * 1000
        }).done(function (topodata) {
            n.color = '#10b981';
            $('#st-' + addr.replace(/\./g, '-')).html('<span class="badge green"><span class="dot"></span>在线</span>');
            $.each(topodata, function (toAddr, flag) {
                var l = links[addr + '-' + toAddr];
                if (!l) return;
                if (flag === 'true') { l.color = '#10b981'; l.curveness = 0; }
                else { l.color = '#f43f5e'; l.curveness = .2; hasAlert = true; }
            });
        }).fail(function () {
            n.color = '#f43f5e';
            hasAlert = true;
            $('#st-' + addr.replace(/\./g, '-')).html('<span class="badge red"><span class="dot"></span>不可达</span>');
        }).always(function () {
            pending--;
            draw();
        });
    });

    function draw() {
        var data = [], lns = [];
        $.each(nodes, function (_, n) {
            data.push({ name: n.name, draggable: true, itemStyle: { color: n.color, shadowBlur: 8, shadowColor: 'rgba(15,23,42,.18)' } });
        });
        $.each(links, function (_, l) {
            lns.push({ source: l.from, target: l.to, lineStyle: { color: l.color, curveness: l.curveness } });
        });
        chart.setOption({ series: [{ data: data, links: lns }] });
        if (hasAlert && $('#sound-toggle').is(':checked') && !window.__alertAudio) {
            // 柔和双音提示, 降低音量避免刺耳
            var a = new Audio(cfg.Topology['Tsound'] || '/alert-soft.wav');
            a.loop = true; a.volume = 0.35;
            var p = a.play();
            if (p && p.catch) {
                p.catch(function () {
                    // 浏览器自动播放策略: 等待首次交互后再播放
                    $(document).one('click keydown', function () {
                        if (window.__alertAudio) window.__alertAudio.play();
                    });
                });
            }
            window.__alertAudio = a;
        }
    }

    $('#sound-toggle').change(function () {
        if (!$(this).is(':checked') && window.__alertAudio) {
            window.__alertAudio.pause();
            window.__alertAudio = null;
        }
    });

    // 自动刷新
    setTimeout(function () { window.location.reload(); }, (cfg.Base['Refresh'] || 1) * 60 * 1000);
    $(window).resize(function () { chart.resize(); });
});
});
</script>
</body>
</html>
