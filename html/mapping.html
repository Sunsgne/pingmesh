<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>全国延迟 - ZENLENET PingMesh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<link href="assets/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/css/modern.css" rel="stylesheet">
</head>
<body>
<div id="app">

  <div class="card" id="map-card">
    <div class="card-head">
      <h3>全国 Ping 延迟地图</h3>
      <span class="sub">电信 / 联通 / 移动 三线路延迟（点击图例切换运营商），可回看历史</span>
      <span class="spacer"></span>
      <input type="datetime-local" class="input" id="pick-time" style="width:195px;padding:6px 8px">
      <button class="btn primary sm" id="pick-btn">查看该时间</button>
      <span class="muted" id="loading"></span>
    </div>
    <div class="card-body">
      <div class="chips mb-4" id="agent-chips"></div>
      <div id="echarts-map" style="width:100%;height:620px"></div>
      <div class="mesh-legend mt-2">
        <span class="lg"><span class="sq" style="background:#10b981"></span>&lt;30ms</span>
        <span class="lg"><span class="sq" style="background:#6ee7b7"></span>30-80ms</span>
        <span class="lg"><span class="sq" style="background:#fcd34d"></span>80-150ms</span>
        <span class="lg"><span class="sq" style="background:#fb923c"></span>150-300ms</span>
        <span class="lg"><span class="sq" style="background:#f43f5e"></span>&ge;300ms</span>
        <span class="lg"><span class="sq" style="background:#eef2f7"></span>未配置探测点</span>
      </div>
    </div>
  </div>

  <div class="card" id="map-disabled" style="display:none">
    <div class="card-body">
      <div class="empty-state">
        <div class="big">&#128506;</div>
        全国延迟功能已关闭<br>
        <span class="muted" style="font-size:12.5px">管理员可在「系统配置 - 基础设置」中开启</span>
        <div class="mt-4"><a class="btn" href="config.html">前往系统配置</a></div>
      </div>
    </div>
  </div>

</div>

<script src="assets/js/jquery-1.7.2.min.js"></script>
<script src="assets/js/echarts-all.js"></script>
<script src="assets/js/app.js"></script>
<script>
$(function () {
SP.init('mapping', '全国延迟').done(function (ctx) {
    var cfg = ctx.config;
    if (cfg.Base && cfg.Base['Chinamap'] === 0) {
        $('#map-card').hide();
        $('#map-disabled').show();
        return;
    }
    var currentBase = '';
    var mainChart = null;

    var box = $('#agent-chips');
    $.each(SP.sourceNodes(cfg), function (_, n) {
        var chip = $('<span class="chip' + (n.Addr === cfg.Addr ? ' active' : '') + '">' + SP.esc(n.Name) + '</span>');
        chip.click(function () {
            $('#agent-chips .chip').removeClass('active');
            chip.addClass('active');
            currentBase = (n.Addr === cfg.Addr) ? '' : '/api/proxy.json?g=http://' + n.Addr + ':' + cfg.Port;
            load('');
        });
        box.append(chip);
    });

    $('#pick-btn').click(function () {
        var v = $('#pick-time').val();
        if (!v) { SP.toast('请选择时间', 'err'); return; }
        load(v.replace('T', ' '));
    });

    load('');
    setTimeout(function () { window.location.reload(); }, (cfg.Base['Refresh'] || 1) * 60 * 1000);

    function mapSeries(name, data) {
        return {
            name: name, type: 'map', mapType: 'china', mapValueCalculation: 'average',
            hoverable: true,
            itemStyle: {
                normal: {
                    label: { show: false },
                    borderColor: '#ffffff', borderWidth: 1.2,
                    areaStyle: { color: '#eef2f7' }
                },
                emphasis: {
                    label: { show: true, textStyle: { color: '#0f172a', fontWeight: 'bold' } },
                    color: '#c7d2fe'
                }
            },
            data: data
        };
    }

    function load(d) {
        $('#loading').html('<span class="spinner"></span>');
        var url = currentBase + '/api/mapping.json' + (d !== '' ? '?d=' + encodeURIComponent(d) : '');
        $.getJSON(url, function (result) {
            $('#loading').html('');
            var option = {
                backgroundColor: 'transparent',
                title: {
                    text: result['text'] + ' · 全国延迟',
                    subtext: result['subtext'],
                    x: 'center',
                    textStyle: { color: '#0f172a', fontSize: 15, fontWeight: 'bold' },
                    subtextStyle: { color: '#94a3b8', fontSize: 12 }
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(15,23,42,0.92)',
                    borderColor: 'rgba(15,23,42,0.92)',
                    textStyle: { color: '#e2e8f0', fontSize: 12 },
                    formatter: function (params) {
                        if (params.value === '-' || isNaN(params.value)) return params.name + '<br>未配置探测点';
                        return params.seriesName + ' · ' + params.name + '<br>平均延迟 ' + Number(params.value).toFixed(1) + ' ms';
                    }
                },
                legend: {
                    orient: 'horizontal', x: 'center', y: 'bottom',
                    selectedMode: 'single',
                    data: ['电信', '联通', '移动'],
                    textStyle: { color: '#475569' }
                },
                dataRange: {
                    min: 0, max: 300, x: 'left', y: 'bottom', text: ['高', '低'],
                    textStyle: { color: '#94a3b8' },
                    splitList: [
                        { start: 300, color: '#f43f5e' },
                        { start: 150, end: 300, color: '#fb923c' },
                        { start: 80, end: 150, color: '#fcd34d' },
                        { start: 30, end: 80, color: '#6ee7b7' },
                        { start: 0, end: 30, color: '#10b981' }
                    ]
                },
                series: [
                    mapSeries('电信', result['avgdelay']['ctcc']),
                    mapSeries('联通', result['avgdelay']['cucc']),
                    mapSeries('移动', result['avgdelay']['cmcc'])
                ]
            };
            if (!mainChart) mainChart = echarts.init(document.getElementById('echarts-map'));
            mainChart.setOption(option, true);
        }).fail(function () {
            $('#loading').html('');
            SP.toast('获取地图数据失败', 'err');
        });
    }
    $(window).resize(function () { if (mainChart) mainChart.resize(); });
});
});
</script>
</body>
</html>
