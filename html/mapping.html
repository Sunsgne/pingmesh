<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>全国延迟 - SmartPing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<link href="assets/css/modern.css" rel="stylesheet">
</head>
<body>
<div id="app">

  <div class="card">
    <div class="card-head">
      <h3>全国 Ping 延迟地图</h3>
      <span class="sub">电信 / 联通 / 移动 三线路延迟，可回看历史时间点</span>
      <span class="spacer"></span>
      <input type="datetime-local" class="input" id="pick-time" style="width:200px">
      <button class="btn primary sm" id="pick-btn">查看该时间</button>
      <span class="muted" id="loading"></span>
    </div>
    <div class="card-body">
      <div class="chips mb-4" id="agent-chips"></div>
      <div id="echarts-map" style="width:100%;height:600px"></div>
    </div>
  </div>

</div>

<script src="assets/js/jquery-1.7.2.min.js"></script>
<script src="assets/js/echarts-all.js"></script>
<script src="assets/js/app.js"></script>
<script>
$(function () {
SP.init('mapping', '全国延迟').done(function (ctx) {
    var cfg = ctx.config;
    var currentBase = '';
    var mainChart = null;

    var box = $('#agent-chips');
    $.each(SP.sourceNodes(cfg), function (_, n) {
        var chip = $('<span class="chip' + (n.Addr === cfg.Addr ? ' active' : '') + '">' + SP.esc(n.Name) + '</span>');
        chip.click(function () {
            $('#agent-chips .chip').removeClass('active');
            chip.addClass('active');
            currentBase = (n.Addr === cfg.Addr) ? '' : '/api/proxy.json?g=http://' + n.Addr + ':' + cfg.Port;
            load('');
        });
        box.append(chip);
    });

    $('#pick-btn').click(function () {
        var v = $('#pick-time').val();
        if (!v) { SP.toast('请选择时间', 'err'); return; }
        load(v.replace('T', ' '));
    });

    load('');
    setTimeout(function () { window.location.reload(); }, (cfg.Base['Refresh'] || 1) * 60 * 1000);

    function load(d) {
        $('#loading').html('<span class="spinner"></span>');
        var url = currentBase + '/api/mapping.json' + (d !== '' ? '?d=' + encodeURIComponent(d) : '');
        $.getJSON(url, function (result) {
            $('#loading').html('');
            var option = {
                title: { text: result['text'], subtext: result['subtext'], x: 'center' },
                tooltip: { trigger: 'item' },
                legend: { orient: 'vertical', x: 'left', data: ['电信', '联通', '移动'] },
                dataRange: {
                    min: 0, max: 200, x: 'left', y: 'bottom', text: ['高', '低'],
                    splitList: [
                        { start: 300, color: '#ef4444' },
                        { start: 150, end: 300, color: '#f97316' },
                        { start: 80, end: 150, color: '#fbbf24' },
                        { start: 30, end: 80, color: '#34d399' },
                        { start: 0, end: 30, color: '#059669' }
                    ]
                },
                toolbox: {
                    show: true, orient: 'vertical', x: 'right', y: 'center',
                    feature: { mark: { show: true }, dataView: { show: true, readOnly: false }, saveAsImage: { show: true } }
                },
                series: [
                    { name: '电信', type: 'map', mapType: 'china', mapValueCalculation: 'average',
                      itemStyle: { normal: { label: { show: true } }, emphasis: { label: { show: true } } },
                      data: result['avgdelay']['ctcc'] },
                    { name: '联通', type: 'map', mapType: 'china', mapValueCalculation: 'average',
                      itemStyle: { normal: { label: { show: true } }, emphasis: { label: { show: true } } },
                      data: result['avgdelay']['cucc'] },
                    { name: '移动', type: 'map', mapType: 'china', mapValueCalculation: 'average',
                      itemStyle: { normal: { label: { show: true } }, emphasis: { label: { show: true } } },
                      data: result['avgdelay']['cmcc'] }
                ]
            };
            if (!mainChart) mainChart = echarts.init(document.getElementById('echarts-map'));
            mainChart.setOption(option, true);
        }).fail(function () {
            $('#loading').html('');
            SP.toast('获取地图数据失败', 'err');
        });
    }
    $(window).resize(function () { if (mainChart) mainChart.resize(); });
});
});
</script>
</body>
</html>
